# 社説（縦組みコラム）
title: "新衣装と当落の翌朝"
body: "昨日の土曜は密度が高かった。正午に開いた立見指定席とステージサイド席の先着は、京王アリーナへの最後の扉だ。映画館ライブビューイングの先行抽選も同時スタートし、全国各地で20thフィナーレへの座席争いが動いた。13時にはシャニマスとSideMの当落が同時に届き、SNSは喜びと悔しさが混在した。夜21時から始まったvα-livのリレー配信は、1周年翌日の静かな高揚感に包まれた。上水流宇宙・レトラ・灯里愛夏それぞれの新衣装が、1stアルバム「彼方」2,000枚突破への感謝として届けられた。本日は「Pop'n ToyBox!!」先行の締切日。間に合うなら今すぐ手続きを。明日にはミリシタが9周年を迎える。秋葉原フェスは今日で3日目。この夏は止まらない。"
