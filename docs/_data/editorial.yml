# 社説（縦組みコラム）
title: "横浜に初星が灯る朝　学マス2周年の集大成"
body: "本日、横浜アリーナにHatsuboshi IDOL FESTIVALの幕が上がる。2024年5月のリリース以来わずか2年、学園アイドルマスターはここまで来た。幕張のH.I.F選抜試験を経た13名が、今日という日に全力を注ぐ。ミリオンは14th LIVEを代々木で構え、765プロの双子たちはZeppへの旅支度を整えた。ヴイアライブは1周年の節目を見据え、SideMもTOYOTA ARENAへ向け走り出した。アイマス20周年のフィナーレIWSFまであと48日。各ブランドが束になって進む夏を、この紙面から見守っていきたい。"
