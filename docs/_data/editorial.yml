# 社説（縦組みコラム）
title: "投票券、集め始めよう ── 総選挙2026がついに動き出した"
body: "昨日20時30分のST@TION生配信で予告された通り、本日は総選挙2026関連の施策が一気に動いた。応援楽曲第2弾「ROSE ～禁じられた愛～」が発売され、15時にはFAMくじ、正午には投票券ミッションがスタート。投票本体は8月3日からだが、集め始めるのは今日からだ。同じ日にシャニマスではStill blueとSideM 11th STAGEの支払い期限が重なり、両掛け持ちのプロデューサーは朝から慌ただしい。ミリシタの秋葉原フェスは6日目、デレステのLIVE Carnivalは11日目と、それぞれ終盤戦へ。7月24日のIWSF2026まで23日。夏のアイマスは、あちこちで同時多発的に盛り上がっている。"
