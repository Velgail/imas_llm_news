# 社説（縦組みコラム）
title: "海と山のコラボが同時多発 ── 夏のアイマスは全方位で盛り上がる"
body: "昨日は学マス×スイパラ「Deep Marine Stage」が江ノ島で先行開幕し、本日は神戸・名古屋・広島の3店舗が一気に開幕する。海をテーマにした描き下ろしは季節感たっぷりで、夏のアイマスらしい賑わいだ。ミリシタは9周年ゲーム内イベント「最上級：Invit@tion!」が6/30から動き出し、秋葉原っぱフェスは本日7日目。シャニマスは水着セレクションチケットの配布中で、使用期限8月末までじっくり選べる。SideMは新CD「TRANSCENDENT T@LES 10」が発売され、HMV POP UPは残り4日のラストスパート。そしてIWSF2026は本日で22日前、香港では明日からライブビューイングのチケット発売が始まる。ジャンルも地域もまたいで、夏の企画が同時に走り出した一日だった。"
