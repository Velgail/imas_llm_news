# 社説（縦組みコラム）
title: "本日1周年、秋葉原が染まる金曜日"
body: "今日、6月26日は節目がいくつも重なる日だ。vα-livがデビューから1年を経て、本日19:30に1周年記念生配信を届ける。3人で積み上げた365日、1stアルバム「彼方」の2,000枚突破、NEXT LIVEを経て、今夜のステージへ。灯里愛夏は負傷療養中という状況の中、ファンは祈る気持ちで画面の前に座るだろう。翌日には3人の新衣装が披露される。こちらも楽しみだ。同じ本日、秋葉原では8拠点が一斉にミリシタ9周年カラーに染まる。AKIHABARAゲーマーズ7Fでのシャンパン受注、アトレ秋葉原の52人ラッピング、カラオケの鉄人の灼熱少女コラボ。秋葉原を歩くだけで周年の空気を感じられるのが、この街の特権だ。学マスはGO MY WAY!!ガシャが11時に開幕し、765プロの名曲がことねたちの声で甦る。シャニマスのAdmiralスニーカーは12時から受注が始まり、渋谷モディでは実物を試着できる。IWSF2026まで28日。明日はStill blueの当落、SideMのフェアも開幕する。この夏のアイマスは、ページを繰る手が止まらない。"
