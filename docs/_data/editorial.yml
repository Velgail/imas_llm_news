# 社説（縦組みコラム）
title: "締切の日曜日、そして5日後の夏祭りへ"
body: "本日日曜日、ROSE CD予約の最終締切（23:59）、dual twin先行（23:59）、ミリオン14th P参加型企画（23:59）など、複数の締切が重なる。昨日はIWSF2026の一般先着チケット販売も始まり、アイマス界隈は一週間で最も動きの多い週末を迎えている。締切を確認し、手を動かすことがプロデューサーの仕事だ。本日の学マスHIF選抜試験コメンタリー同時視聴（第2回）も見逃さないように。そして視線はもう来週の6月26日へ向かっている。ミリシタ9周年秋葉原フェス開幕、アトレ秋葉原コラボ開幕、カラオケの鉄人コラボ開幕、学マスGO MY WAY!!ガシャ開始、vα-liv 1周年——5日後の木曜日は、アイマス界隈の夏祭りが一斉に幕を開ける。今日の締切をこなしながら、その日を待ちたい。"
