# 社説（縦組みコラム）
title: "当落と新衣装が重なる土曜日"
body: "本日は節目が重なる。正午に始まるIWSF2026の立見先着と映画館ライブビューイング先行は、夏フェスへの参加意志を試される関門だ。3万6000円の通し券に手が届かなかった方にとって、1万1500円の立見指定席は最後の現地観戦チャンスになるかもしれない。13時には二つの当落が届く。シャイニーカラーズ「Still blue」とSideM 11th STAGE。申し込んだ方は昼前から落ち着かない時間を過ごしているだろう。夜21時、vα-livの3人がそれぞれの公式チャンネルで新衣装を披露する。昨夜の1周年生配信から一夜明け、1stアルバム「彼方」2,000枚突破を祝う形でのリレー配信だ。秋葉原ではミリシタ9周年フェスが2日目に入り、AKIHABARAゲーマーズの整理券抽選は今日で最終日。渋谷ではシャニマスの「No 1 feel alone」POPUPが昨日開幕した。IWSF2026まであと27日。この夏は走ったまま終わる。"
