# 社説（縦組みコラム）
title: "開幕と締め切りが交差する週に"
body: "シャニマス・Team.Stellaのちびぐるみが全国のクレーンゲームに姿を現した昨日、一つの扉が開いた。9種の小さな布の塊に込められた愛情は、7月のTeam.Luna、8月のTeam.Solへと連なる季節のリレーへ続く。同じ昨日、ミリシタのmyブランドガシャが静かに幕を閉じ、ガラクタロードシングルのアソビストア受注も締め切りを迎えた。開幕と終幕が入れ替わりで訪れるこの業界の時間の密度は、他に類を見ない。学マスのハツボシガクエンターミナルは本日東京駅一番街での13日間の旅を終える。それは同時に、6月下旬のGO MY WAY!!ガシャへの助走でもある。今週末にはSideM 11thのチケット先行と、カードフォリオキャンペーン、シャニマスREFRAC7IONS先行が一斉に締め切られる。締め切りの向こうに待つ祭りのために、いま確かめておきたいことがある。"
