# 社説（縦組みコラム）
title: "今夜の生配信が14thLIVEの輪郭を描く"
body: "本日19時、ミリオンライブ14thLIVEの詳細を発表する生配信がYouTubeに流れる。9月19日・20日に国立代々木競技場 第一体育館という前例のない大舞台が待ち受ける中、今夜の配信では出演者・タイトル・チケット情報という三つの輪郭が一気に定まる予定だ。プロデューサーたちは長らく「場所と日程だけ」という状態で過ごしてきた。そのもどかしさが今夜7時に解消される。同じ週末、シンデレラガールズ舞台「DERE of the DEAD」の一般先着は正午にスタートし、アニサマ2026出演発表にわくイルミネーションスターズのファンも活気に満ちている。Still blueの先行締め切りは明日に迫る。複数の時計が一斉に動き出す土曜日に、今夜の生配信が最大の針となる。"
