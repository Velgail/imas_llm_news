# 社説（縦組みコラム）
title: "投票前夜 ── 総選挙の「本番」はここからだ"
body: "今夜20時30分、シンデレラガール総選挙2026の公式生配信「ST@TION」が始まる。河瀬茉希たちが投票券の集め方を話し、明日発売のROSEについて語る。190名が対象のこの選挙は8月が「本番」だが、その前哨戦はすでに始まっている。同時にミリシタは昨日9周年を迎え、本日から「最上級：Invit@tion!」が動き出した。デレステのLIVE Carnivalは事前キャンプを終えて本番フェーズに入り、秋葉原では5日目のフェスティバルが動いている。7月24日のIWSF2026まで24日。夏のアイマスはここからが本番だ。"
