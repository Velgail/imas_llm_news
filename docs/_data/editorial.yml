# 社説（縦組みコラム）
title: "9年目のシアターへ"
body: "本日、ミリシタが9周年を迎えた。2017年6月29日に開いたシアターのドアは今日も変わらず立っている。昨日は秋葉原ゲーマーズの7階でシャンパンが開けられた。試飲会という言葉の響きには少し笑えるが、プロデューサーたちが9年分の思いを注いだ場所であることは疑いがない。明日の夜、CG総選挙のST@TION生配信がある。河瀬茉希たちが投票券の集め方を話し、ROSEの最新情報が届く。明後日にはそのROSEが店頭に並ぶ。一方でシャニマスとSideMのチケット支払いも明後日が期限だ。夏の始まりはいつもせわしない。しかしその忙しさこそ、アイマスが9年・15年・20年と重ねてきた証左でもある。"
