# 社説（縦組みコラム）
title: "歌舞伎町タワーに灯る9周年の光、そして秋葉原へ"
body: "本日19時、東急歌舞伎町タワー3階のnamco TOKYOに大関英里・小岩井ことり・諏訪彩花が集まる。ミリシタ9周年生配信 Ultimate Party Night！は無料入場の公開生放送で、YouTubeとニコニコでも同時配信される。DJブースに立つのは天空橋朋花こと小岩井ことり――yfgとしてのDJライブが予告されており、周年前夜の熱量を肌で感じられる夜になりそうだ。昨夜は「INVISIBLE LIGHT」ビンゴが幕を閉じ、8日間の戦いに決着がついた。明後日からは秋葉原が9周年一色に染まる。フェスティバル開幕・カラオケの鉄人コラボ・ゲーマーズのシャンパン受注が同じ6月26日に集中し、学マスのGO MY WAY!!ガシャ、vα-livの1周年も同日だ。6月27日にはStill blueの当落が届き、IWSF2026の立見指定先着も動き出す。週後半に向けて、プロデューサーたちのスケジュール帳は今夜の配信でまた一段と埋まっていくことだろう。"
