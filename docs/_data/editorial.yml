# 社説（縦組みコラム）
title: "ブライダルと甘味の6月が動く"
body: "昨日のミリシタは華やかだった。菊地真と三浦あずさのブライダルカードがビンゴイベントに添えられ、望月杏奈とロコの新SSRは各ファンを画面の前に釘付けにした。開幕から24時間が経たぬ今朝、ランキングの顔触れがそれを雄弁に証明している。翻れば、学マス陣営では有村麻央と姫崎莉波のRippleSignが来週月曜に「SUGAR FLAVOR」で本格始動する。遊園地のコラボが終わり事後通販として蘇ったよみうりランドの思い出グッズと合わせ、学マス世界は「祭りの後」と「次の祭り」を同時進行させている。SideMはグッズ第2弾を週明けに控え、765プロは8月3都市ツアーのチケットを今月中に仕上げにかかる。シャニマスのREFRAC7IONS先行は今週日曜が最終関門だ。今週末は締め切りが束になって押し寄せる。手帳と財布を今一度確認されたい。"
