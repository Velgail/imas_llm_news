# 社説（縦組みコラム）
title: "土曜に開幕し、明日に締め切られる週末の密度"
body: "本日土曜日、SideM×HMV&BOOKS SHIBUYAのPOP UP SHOPが開幕した。ネオチャイナ衣装に身を包んだDRAMATIC STARSとC.FIRSTが渋谷に登場する。週末の今日、足を運べるPはぜひ。一方でミリシタ「INVISIBLE LIGHT」ビンゴは本日15時に折り返しを迎え、後半の倍消費が始まる。ゲームの画面と渋谷の店舗、どちらもプロデューサーが動く日だ。明日6月21日は締切が5件以上集中する。ROSE CD予約（23:59）、dual twin先行（14:59）、HIF同時視聴（23:59）、チュッパチャプス先行通販、ビックカメラ学マスフェア。手帳を開いて、漏れを確認してほしい。来週6月26日に向けては学マスGO MY WAY!!ガシャ、vα-liv 1周年、ミリシタ秋葉原フェスと、さらに密度が上がっていく。"
