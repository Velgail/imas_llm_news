# 社説（縦組みコラム）
title: "夏のアイマスは街へ出る"
body: "昨日、シンデレラガールズと学マスの合同ポップアップストア「Starlight Dining」の開催が発表された。アトレ川崎で7月、日本と中国の同時開催というスケールで。ミリオンライブは来月、秋葉原エリア全体を9周年フェスティバルの舞台にする。ロコとゆかりの深い町田ではアートラリーが7月末から始まる。チュッパチャプスと学マスは池袋駅に夏の期間限定ショップを出す。ゲームの中のキャラクターが、街の中のある一点に宿るとき、そこに立ちに行ける。それがリアルイベントの持つ力だ。IDOL WORLD SUPER FESTIVALまであと37日。各ブランドが息を合わせて、アイマスの夏が始まろうとしている。"
