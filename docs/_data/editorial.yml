# 社説（縦組みコラム）
title: "明日のnamco TOKYOへ、9周年の灯火が集う"
body: "ミリシタのINVISIBLE LIGHTが本日夜に幕を引く。と同時に、目線は自然と明日の歌舞伎町タワーへと向かう。大関英里・小岩井ことり・諏訪彩花が最新情報を届けるnamco TOKYO生配信は、9周年ウィーク本番の号砲だ。6月26日には秋葉原フェスが開幕し、カラオケの鉄人がコラボドリンクを注ぎ、AKIHABARAゲーマーズでは記念シャンパンの受注が始まる。同じ日にvα-livが1周年を迎え、学マスではGO MY WAY!!ガシャが回り出す。昨日はシャニマスのジューンブライド投票が閉じた。6月を飾るアイドルはまだ発表されていない。結果を待ちながら、プロデューサーたちは梅雨の合間に秋葉原へと足を向ける準備を始めている。アイマスの夏はもう、目の前にある。"
