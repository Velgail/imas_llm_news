# 社説（縦組みコラム）
title: "二人で立つステージが作る新しい物語"
body: "昨日の生配信が終わり、ミリオンライブ14thLIVEの輪郭は鮮明になった。DAY1に徳川まつりとエミリー・スチュアート、DAY2に馬場このみと百瀬莉緒。シリーズ初のツイン主演制は、数字の上では主演公演の消化を速める実務的な選択でもあるが、それ以上に「二人で一枚のステージを作る」という美学を感じさせる。主演は特定のアイドルへの大きなスポットライトであり、その光を二つに分けることは減ずることではなく、化学反応を生むことだ。プロデューサーがセトリと演出の一部を決める参加型企画も発表された。ライブの主役が壇上の4人だけでなく、会場にいる全員に広がろうとしている。9月19日と20日、国立代々木競技場 第一体育館で何が起きるか。想像するだけで鼓動が速くなる。"
