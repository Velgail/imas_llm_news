# 社説（縦組みコラム）
title: "週末は締め切りと生配信が重なる"
body: "昨日の午後1時、SideM 11thのプレミアム先行当落が発表され、結果を固唾を飲んで待っていたプロデューサーたちの明暗が分かれた。当選者には6月14日（日）23時59分という支払い期限が迫る。同日は奇しくも、シャニマス「Still blue」の先行受付も終わる。土日の2日間は、あちこちから「気づいたら締め切りが過ぎていた」という声が聞こえてきそうだ。明日は明日で、ミリオンライブ14thLIVEの詳細を告げる生配信が夜7時に控え、デレミュ「DERE of the DEAD」の一般先着チケットも正午から動き出す。週末に予定をこなしきれるかどうか、プロデューサーとしての真価が問われる。一息ついたら7月24日から、京王アリーナTOKYOでアイマス20周年のフィナーレが待っている。締め切りをくぐり抜けた先に、集大成の舞台が見えてきた。"
