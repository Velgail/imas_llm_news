# 社説（縦組みコラム）
title: "1周年の夜明けと、秋葉原を包む9周年の熱気"
body: "昨夜の歌舞伎町タワーから、明日は秋葉原へ。大関英里・小岩井ことり・諏訪彩花が盛り上げたnamco TOKYOのUltimate Party Nightが終わり、ミリシタ9周年フェスティバルのバトンは今日一日の準備期間を経て、いよいよ明日6月26日の秋葉原全域へと手渡される。AKIHABARAゲーマーズ・カラオケの鉄人・アトレ秋葉原が一斉に9周年カラーに染まる光景は、毎年夏の始まりを告げるひとつの祭りだ。同じ6月26日、vα-livは静かに1周年を迎える。灯里愛夏のバースデーライブ延期という残念なニュースはあったが、上水流宇宙・レトラの二人と、遠くからでも応援を届けたい愛夏の存在感は変わらない。365日、たった3人で積み上げてきた足跡を、今夜ゆっくりと振り返ってほしい。MILLION BATTLE OF THE@TER 08のCDリリース、14thLIVEのグッズ受注開始、そして総選挙2026に向けたFAMくじ解禁と、昨日は数字の上でも盛りだくさんな一日だった。週末にはStill blueの当落も届く。プロデューサーたちのメールボックスは、この夏もまた分刻みで動き続ける。"
