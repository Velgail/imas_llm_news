# 社説（縦組みコラム）
title: "新潟の空に届くエール"
body: "昨日、シンデレラガールズと新潟市・佐渡市のコラボ「がたます」の開催が発表された。砂塚あきら、片桐早苗、江上椿――新潟出身アイドルたちの新規描き下ろしが用意される。ゲームの中のキャラクターが、リアルの街に現れる瞬間がある。地方都市とのコラボはその最たるものだ。プレイヤーが実際に新潟や佐渡を訪ね、スタンプラリーを歩き、知らなかった風景に出会う。その体験をアイドルが背中を押してくれる。同日には「After20」と「U149」の新装版予約も始まった。どちらも何年も前に始まった物語が、今日も形を変えて続いている。コンテンツが積み重なるということは、物語が終わらないということだ。終わらない物語をもつブランドは強い。"
