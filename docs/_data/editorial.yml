# 社説（縦組みコラム）
title: "今週末に締切が重なる、その意味"
body: "今週日曜（6月21日）23:59を期限とする申込が3件ある。シンデレラガール総選挙2026応援楽曲「ROSE」のCD予約、765プロ「dual twin live tour」のアソビストア2次先行、そして学マスHIF選抜試験のキャストコメンタリー同時視聴会。別々の企画がたまたま同じ締切を迎えるのではなく、総選挙・新ライブ・ライブ映像という3本の柱が今週末にいっせいに旬を迎えるということだ。さらにCG総選挙ST@TION生配信が6月30日に確定し、SideM 11thグッズ第2弾も本日から販売開始と、アイマス各ブランドが一斉に夏の本番へ走り出した。IWSF2026まで36日。週末の締切を逃さず、それぞれの推しのために動いてほしい。"
