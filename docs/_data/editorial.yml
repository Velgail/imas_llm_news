# 社説（縦組みコラム）
title: "積み上げることと、刷新すること"
body: "月曜の朝、ゲームを起動すると新しいガシャが始まっている。学マスのRippleSign、SUGAR FLAVOR。有村麻央と姫崎莉波が並ぶカードイラストを前に、先週のHatsuboshi IDOLで彼女たちが披露した同曲のパフォーマンスが蘇る人も多いだろう。ライブで歌われた楽曲がゲームに降りてくる。それはひとつの「完成」ではなく、新しい積み上げの始まりだ。同じ日、ミリシタではINVISIBLE LIGHTビンゴが開幕した。9周年まで2週間を切り、連続イベントは佳境に入っている。SideM Legenders の月例CDは7月29日に加わる。ジューンブライドは今週末で終わる。各ブランドが、それぞれのペースで前へ進んでいる。アイドルコンテンツを追い続けることは、時として忙しすぎると感じることもある。しかし、この「刷新し続ける」という営みの中にこそ、あらゆるプロデューサーが居場所を見つけている。"
