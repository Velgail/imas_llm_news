{% assign ed = site.data.editions[include.edition] %}
<header class="masthead">
<div class="rule-double"></div>
<div class="masthead__grid">
<div class="issue-meta"><span class="issue-no">{{ ed.issueNo }}</span><span class="date-long">{{ ed.dateLong }}</span><span class="pages">{{ ed.pages }}・{{ ed.stamp }}</span></div>
<a class="nameplate nameplate-link" href="{{ '/' | relative_url }}"><h1>こ<span class="kotatsu-mark">た</span>つアイマス速報</h1><span class="yomi">{{ site.yomi }}</span></a>
<div class="index-box"><span class="ib-label">{{ site.index_label }}</span><span class="ib-value">{{ ed.indexValue }}</span><span class="ib-note">{{ ed.indexNote }}</span></div>
</div>
<div class="masthead__tagline">{{ site.tagline }}</div>
<div class="rule-double bottom"></div>
</header>
